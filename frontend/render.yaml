services:
  - type: web
    name: f1-cfd-frontend
    env: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: NEXT_PUBLIC_API_URL
        value: https://your-backend-name.onrender.com  # Update this after backend deployment